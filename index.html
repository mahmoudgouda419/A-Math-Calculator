<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="calculator">
          Calculator
        </button>

        <button class="mode-btn" data-mode="tip">
          Tip Calculator
        </button>
        <button class="mode-btn" data-mode="currency">
          Currency
        </button>
      </div>
      <div class="tip-page hidden">

        <h2>Tip Calculator</h2>

        <input
                type="number"
                id="bill"
                placeholder="Bill Amount">

        <input
                type="number"
                id="tip"
                placeholder="Tip %">

        <button id="calcTip">
          Calculate
        </button>

        <div class="tip-result">
          <p>Tip: <span id="tipAmount">$0</span></p>
          <p>Total: <span id="totalAmount">$0</span></p>
        </div>

      </div>
      <div class="currency-page hidden">

        <h2>Currency Converter</h2>
        <input
                type="number"
                id="amount"
                placeholder="Amount">

        <select id="fromCurrency"></select>
        <button id="swapCurrencies">⇄</button>
        <select id="toCurrency"></select>
        <button id="convertBtn">
          Convert
        </button>

        <h2 id="currencyResult"></h2>
      </div>
      <div class="calculator-page">
        <div class="calculator">
          <div class="screen">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand"></div>
          </div>

          <button data-clear class="span-two">AC</button>
          <button data-percent>%</button>
          <button data-operator>&divide;</button>

          <button data-number>7</button>
          <button data-number>8</button>
          <button data-number>9</button>
          <button data-operator>&times;</button>

          <button data-number>4</button>
          <button data-number>5</button>
          <button data-number>6</button>
          <button data-operator>-</button>

          <button data-number>1</button>
          <button data-number>2</button>
          <button data-number>3</button>
          <button data-operator>+</button>

          <button data-number class="span-two justify-left">0</button>
          <button data-number>.</button>
          <button data-equals>=</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
